<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能不能和yds交友 - 智能匹配测试</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        
        body {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            line-height: 1.6;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-left: 6px solid #6c5ce7;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .instructions {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            color: #555;
        }
        
        .progress-container {
            margin: 25px 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .progress-bar-container {
            background: #e0e6ff;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            width: 0%;
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #6c5ce7;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .requirements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 12px;
            margin-bottom: 30px;
        }
        
        .requirement-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }
        
        .requirement-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.1);
        }
        
        .requirement-item.selected {
            background-color: #f8f9ff;
            border-color: #6c5ce7;
        }
        
        .req-number {
            min-width: 32px;
            height: 32px;
            background: #dfe6ff;
            color: #6c5ce7;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 14px;
        }
        
        .req-text {
            flex: 1;
            font-size: 15px;
        }
        
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 6px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .requirement-item.selected .checkbox {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }
        
        .requirement-item.selected .checkbox::after {
            content: "✓";
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        
        .results {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
            border-top: 6px solid #fd79a8;
            display: none;
        }
        
        .score-display {
            font-size: 60px;
            font-weight: bold;
            background: linear-gradient(135deg, #6c5ce7, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .compatibility-level {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #ffeaa7, #fab1a0);
            border-radius: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
            font-size: 18px;
        }
        
        .result-message {
            font-size: 18px;
            color: #555;
            margin: 20px 0;
            line-height: 1.6;
        }
        
        .match-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .detail-card {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .detail-value {
            font-size: 24px;
            font-weight: bold;
            color: #6c5ce7;
        }
        
        .detail-label {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        
        button {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            padding: 14px 35px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(108, 92, 231, 0.4);
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #636e72, #b2bec3);
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 13px;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .requirements-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-container, .match-details {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            .score-display {
                font-size: 50px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>能不能和yds交友 - 智能匹配测试</h1>
        <p class="subtitle">根据yds的真实特质进行智能匹配，看看你们的兼容性如何</p>
        
        <div class="instructions">
            <p>请勾选所有符合您现状的选项，系统会根据智能算法计算您与yds的匹配度。</p>
            <p>匹配算法会基于多项因素综合计算，给出最准确的兼容性评估。</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-label">
                <span>匹配度: <strong id="compatibilityPercentage">0%</strong></span>
                <span>已选择: <strong id="selectedCount">0</strong> 项</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-value" id="statSelected">0</div>
                <div class="stat-label">选中项目</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statScore">0</div>
                <div class="stat-label">匹配得分</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statMax">100</div>
                <div class="stat-label">最高分</div>
            </div>
        </div>
    </div>

    <div class="requirements-grid" id="requirementsList">
        <!-- 项目会通过JavaScript动态生成 -->
    </div>

    <div class="results" id="resultsSection">
        <h2>匹配结果</h2>
        <p>您与yds的智能匹配度：</p>
        <div class="score-display" id="finalScore">0%</div>
        
        <div class="compatibility-level" id="compatibilityLevel">计算中...</div>
        
        <div class="result-message" id="resultMessage">
            系统正在分析您的匹配数据...
        </div>
        
        <div class="match-details">
            <div class="detail-card">
                <div class="detail-value" id="detailSelected">0</div>
                <div class="detail-label">您的选择数</div>
            </div>
            <div class="detail-card">
                <div class="detail-value" id="detailScore">0</div>
                <div class="detail-label">匹配得分</div>
            </div>
            <div class="detail-card">
                <div class="detail-value" id="detailMatch">0%</div>
                <div class="detail-label">核心匹配率</div>
            </div>
            <div class="detail-card">
                <div class="detail-value" id="detailMax">100</div>
                <div class="detail-label">理论最高分</div>
            </div>
        </div>
        
        <div class="buttons">
            <button class="reset-btn" onclick="resetTest()">重新测试</button>
            <button onclick="shareResult()">分享结果</button>
        </div>
    </div>
    
    <div class="footer">
        本测试采用智能匹配算法，综合多项因素评估兼容性<br>
        所有计算均在本地完成，数据安全有保障
    </div>

    <script>
        // 测试项目数据
        const requirements = [
            "爱装逼", "自认为小众", "自认为有文艺气息", "阳痿", "经常有孤独感",
            "经济较为拮据", "性冷淡/有立性冷淡人设的打算", "bmi低于22", "罹患一种以上心理疾病", "爱唱反调",
            "爱盯着手机傻笑", "持续阳痿", "谈恋爱不超过三次", "身边异性较少", "被人骂过傻福",
            "不止一次思考过自杀", "怕死", "学习过乐器", "演奏水平较低", "有自己喜欢的音乐风格",
            "自认为在音乐鄙视链中处于较上端位置", "喜欢看文艺片", "看文艺片时犯困", "阳痿恶化", "身上有原生家庭留下的阴影",
            "偶尔写一些自认为深刻的文字", "看超过500字的文章就头晕眼花", "在亲密关系中是倒贴的一方", "安慰过自己'会幸福的'", "阳痿急性发作",
            "向往自由", "感觉自己不自由的原因是没钱", "尝试健身", "放弃健身", "再次尝试健身",
            "再次放弃健身", "研究过穿搭", "被人评价穿得很恶心", "有时感觉自己还算好看", "精心p的自拍发到朋友圈无人在意",
            "爱说脏话", "身上有穿孔/纹身", "男性留过长发", "女性染过乱七八糟的发色", "觉得自己以外的人都很土",
            "被人骂过土狗", "碍于面子不去医院治疗阳痿", "认为自己三观正", "悲观主义", "发现就算治愈了阳痿也没用"
        ];
        
        // yds的真实选择（后台数据，不向用户显示）
        const ydsSelections = [0, 1, 2, 4, 5, 7, 9, 12, 13, 16, 19, 20, 21, 25, 30, 31, 37, 41, 44, 48];
        
        // 用户选择状态
        const userSelections = new Array(requirements.length).fill(false);
        
        // 初始化界面
        function initInterface() {
            const container = document.getElementById('requirementsList');
            container.innerHTML = '';
            
            requirements.forEach((text, index) => {
                const item = document.createElement('div');
                item.className = 'requirement-item';
                item.onclick = () => toggleSelection(index);
                
                item.innerHTML = `
                    <div class="req-number">${index + 1}</div>
                    <div class="req-text">${text}</div>
                    <div class="checkbox"></div>
                `;
                
                container.appendChild(item);
            });
            
            updateCalculations();
        }
        
        // 切换选择状态
        function toggleSelection(index) {
            userSelections[index] = !userSelections[index];
            const items = document.querySelectorAll('.requirement-item');
            
            if (userSelections[index]) {
                items[index].classList.add('selected');
            } else {
                items[index].classList.remove('selected');
            }
            
            updateCalculations();
        }
        
        // 更新计算和显示
        function updateCalculations() {
            const selectedCount = userSelections.filter(selected => selected).length;
            
            // 计算与yds的匹配度
            let sameCount = 0;
            ydsSelections.forEach(index => {
                if (userSelections[index]) {
                    sameCount++;
                }
            });
            
            // 加权计算：与yds相同的选择权重更高
            const differentCount = selectedCount - sameCount;
            const weightedScore = (sameCount * 2) + differentCount;
            const maxPossibleScore = (ydsSelections.length * 2) + (requirements.length - ydsSelections.length);
            
            // 计算匹配百分比
            let matchPercentage = 0;
            if (maxPossibleScore > 0) {
                matchPercentage = Math.round((weightedScore / maxPossibleScore) * 100);
            }
            
            // 计算核心匹配率（与yds选择的重合度）
            let coreMatchRate = 0;
            if (selectedCount > 0) {
                coreMatchRate = Math.round((sameCount / Math.min(selectedCount, ydsSelections.length)) * 100);
            }
            
            // 更新显示
            updateDisplay(selectedCount, weightedScore, maxPossibleScore, matchPercentage, coreMatchRate, sameCount);
        }
        
        // 更新显示
        function updateDisplay(selectedCount, score, maxScore, percentage, coreMatchRate, sameCount) {
            // 更新统计数据
            document.getElementById('selectedCount').textContent = selectedCount;
            document.getElementById('compatibilityPercentage').textContent = `${percentage}%`;
            document.getElementById('statSelected').textContent = selectedCount;
            document.getElementById('statScore').textContent = score;
            document.getElementById('statMax').textContent = maxScore;
            
            // 更新进度条
            document.getElementById('progressBar').style.width = `${percentage}%`;
            
            // 更新结果区域
            if (selectedCount > 0) {
                document.getElementById('resultsSection').style.display = 'block';
                
                document.getElementById('finalScore').textContent = `${percentage}%`;
                document.getElementById('detailSelected').textContent = selectedCount;
                document.getElementById('detailScore').textContent = score;
                document.getElementById('detailMatch').textContent = `${coreMatchRate}%`;
                document.getElementById('detailMax').textContent = maxScore;
                
                // 更新兼容性等级和消息
                updateResultMessages(percentage, sameCount, selectedCount);
            } else {
                document.getElementById('resultsSection').style.display = 'none';
            }
        }
        
        // 更新结果消息
        function updateResultMessages(percentage, sameCount, selectedCount) {
            const levelElement = document.getElementById('compatibilityLevel');
            const messageElement = document.getElementById('resultMessage');
            
            let level = '';
            let message = '';
            
            if (percentage <= 20) {
                level = '👥 普通相识';
                message = '你们有一些基本的共同点，但可能需要更多了解才能深入交流。';
            } else if (percentage <= 40) {
                level = '🤝 潜在伙伴';
                message = '你们有一定程度的共同语言，可以愉快地进行日常交流。';
            } else if (percentage <= 60) {
                level = '😊 不错匹配';
                message = '相当不错的匹配度！你们有很多相似之处，很可能成为聊得来的朋友。';
            } else if (percentage <= 80) {
                level = '💫 高度契合';
                message = '非常高的匹配度！你们共享着相似的观点和感受，很容易理解彼此。';
            } else {
                level = '✨ 灵魂共鸣';
                message = '惊人的匹配度！你们在很多方面都高度一致，这很难得！';
            }
            
            // 根据相同选择数量添加额外信息
            if (sameCount > 0) {
                const extraInfo = ` 你们在${sameCount}个核心特质上表现一致。`;
                message += extraInfo;
            }
            
            levelElement.textContent = level;
            messageElement.textContent = message;
        }
        
        // 重置测试
        function resetTest() {
            if (confirm("确定要重新开始测试吗？当前选择将被清除。")) {
                // 清空用户选择
                for (let i = 0; i < userSelections.length; i++) {
                    userSelections[i] = false;
                }
                
                // 重置UI
                document.querySelectorAll('.requirement-item').forEach(item => {
                    item.classList.remove('selected');
                });
                
                // 重新初始化
                updateCalculations();
            }
        }
        
        // 分享结果
        function shareResult() {
            const selectedCount = userSelections.filter(selected => selected).length;
            const sameCount = ydsSelections.filter(index => userSelections[index]).length;
            const differentCount = selectedCount - sameCount;
            const weightedScore = (sameCount * 2) + differentCount;
            const maxPossibleScore = (ydsSelections.length * 2) + (requirements.length - ydsSelections.length);
            const percentage = Math.round((weightedScore / maxPossibleScore) * 100);
            
            const shareText = `我在"能不能和yds交友"测试中获得了${percentage}%的匹配度！\n` +
                             `测试显示我们有很多共同点，你也快来测测和yds的兼容性吧！`;
            
            if (navigator.share) {
                navigator.share({
                    title: '能不能和yds交友 - 测试结果',
                    text: shareText,
                    url: window.location.href
                }).catch(() => {
                    fallbackShare(shareText);
                });
            } else {
                fallbackShare(shareText);
            }
        }
        
        // 备用分享方案
        function fallbackShare(shareText) {
            const shareUrl = window.location.href;
            const fullText = `${shareText}\n测试链接：${shareUrl}`;
            
            if (navigator.clipboard) {
                navigator.clipboard.writeText(fullText)
                    .then(() => alert("结果已复制，快去分享给朋友吧！"))
                    .catch(() => {
                        prompt("请手动复制以下内容：", fullText);
                    });
            } else {
                prompt("请手动复制以下内容：", fullText);
            }
        }
        
        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', initInterface);
    </script>
</body>
</html>
